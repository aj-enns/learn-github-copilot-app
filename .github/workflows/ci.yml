name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sample-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm test
